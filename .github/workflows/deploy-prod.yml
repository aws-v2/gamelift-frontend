name: CI - Test and PR to Staging

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write


jobs:
  prod-full-suite:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run test




  prod-build-image:
    runs-on: ubuntu-latest
    needs: prod-full-suite
    if: github.event_name == 'push'
    steps:

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: qarani/gamelift-frontend-server:prod
          build-args: |
            VITE_APP_PROFILE=prod


  prod-deploy:
    needs: prod-build-image
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Deploy to Production via SSH over Tailscale...
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          passphrase:
          script: |
            docker network create --attachable --driver overlay aws-prod-network  || true
            docker pull qarani/gamelift-frontend-server:prod
            docker service rm gamelift-frontend-server-prod || true

            docker service create \
              --name gamelift-frontend-server-prod \
              --network aws-prod-network \
              --env VITE_API_BASE_URL=http://api-gateway-prod:8080 \
              --env VITE_APP_PROFILE=prod \
              --env API_GATEWAY_HOST=api-gateway-prod \
              --publish published=5174,target=80 \
              --replicas 1 \
              qarani/gamelift-frontend-server:prod

