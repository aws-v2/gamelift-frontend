name: CI - Test and PR to Staging

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]


permissions:
  contents: write
  pull-requests: write




jobs:
  dev-unit-test:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Debug files (temporary)
        run: ls -R

      - name: Run unit tests
        run: npm run test:unit

  dev-build-image:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [dev-unit-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: qarani/frontend-server:dev
          build-args: |
            VITE_APP_PROFILE=dev

  dev-open-pr-to-dev:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    needs: [dev-unit-test, dev-build-image]
    runs-on: ubuntu-latest  
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR dev → staging.
        run: |
          if gh pr list --base staging --head dev --state open --json number | jq -e 'length > 0' > /dev/null; then
            echo "PR already exists. Skipping..."
          else
            gh pr create \
              --base staging \
              --head dev \
              --title "chore: promote dev → staging" \
              --body "✅ All CI checks passed on dev. Auto-generated PR."
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}